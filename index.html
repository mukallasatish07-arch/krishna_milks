<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Milk Delivery</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("milk-bg.jpg") center/cover no-repeat;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:40px;
}

h1{
font-size:40px;
}

.btn{
background:#28a745;
padding:15px 25px;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

.container{
display:none;
background:white;
color:black;
padding:20px;
border-radius:10px;
max-width:400px;
margin:30px auto;
}

input,select{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

.review{
margin-top:30px;
font-style:italic;
}

</style>
</head>

<body>

<div class="overlay">

<h1>🥛 Welcome to Fresh Milk Service</h1>
<p>Trusted Milk Supply for 20+ Years</p>

<button class="btn" onclick="showOrder()">Order Milk</button>

<div class="review">
⭐ "Very fresh milk everyday!" – Ravi  
<br>
⭐ "Best milk supplier in our area." – Sita
</div>

<div class="container" id="orderBox">

<h2>Order Milk</h2>

<input type="text" id="name" placeholder="Customer Name">

<input type="tel" id="phone" placeholder="Phone Number">

<input type="text" id="location" placeholder="Location">

<select id="liters" onchange="calculatePrice()">
<option value="1">1 Liter</option>
<option value="2">2 Liters</option>
<option value="3">3 Liters</option>
<option value="5">5 Liters</option>
</select>

<h3>Total Price: ₹ <span id="price">50</span></h3>

<select id="payment">
<option>UPI</option>
<option>Cash on Delivery</option>
</select>

<br>

<button class="btn" onclick="sendOrder()">Place Order</button>

</div>

</div>

<script>

function showOrder(){
document.getElementById("orderBox").style.display="block";
}

function calculatePrice(){
let liters=document.getElementById("liters").value;
document.getElementById("price").innerText=liters*50;
}

function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;
let liters=document.getElementById("liters").value;
let payment=document.getElementById("payment").value;
let price=liters*50;

let message="Milk Order%0A%0A"
+"Name: "+name+"%0A"
+"Phone: "+phone+"%0A"
+"Location: "+location+"%0A"
+"Liters: "+liters+"L%0A"
+"Total Price: ₹"+price+"%0A"
+"Payment: "+payment;

let whatsappURL="https://wa.me/918328688831?text="+message;

window.open(whatsappURL,'_blank');

}

</script>

</body>
</html>
