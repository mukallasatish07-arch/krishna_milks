<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresh Milk Delivery</title>

<style>
body{
margin:0;
font-family:Arial;
background:url("milk-bg.jpg") center/cover no-repeat;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:40px;
}

.btn{
background:#28a745;
padding:14px 22px;
border:none;
color:white;
font-size:18px;
border-radius:8px;
margin-top:15px;
cursor:pointer;
}

.container{
display:none;
background:white;
color:black;
padding:20px;
border-radius:10px;
max-width:400px;
margin:30px auto;
}

input,select{
width:90%;
padding:10px;
margin:10px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>🥛 Fresh Milk Service</h1>
<p>Trusted Milk Business Since 20+ Years</p>

<button class="btn" onclick="showOrder()">Order Milk</button>

<div class="container" id="orderBox">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Location">

<select id="liters" onchange="priceCalc()">
<option value="1">1 Liter</option>
<option value="2">2 Liters</option>
<option value="3">3 Liters</option>
<option value="4">4 Liters</option>
<option value="5">5 Liters</option>
</select>

<h3>Total ₹ <span id="price">50</span></h3>

<select id="payment">
<option value="cod">Cash on Delivery</option>
<option value="upi">UPI Payment</option>
</select>

<button class="btn" onclick="processOrder()">Continue</button>

</div>

</div>

<script>

function showOrder(){
document.getElementById("orderBox").style.display="block";
}

function priceCalc(){
let liters=document.getElementById("liters").value;
document.getElementById("price").innerText=liters*50;
}

function processOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;
let liters=document.getElementById("liters").value;
let payment=document.getElementById("payment").value;
let price=liters*50;

let message="Milk Order%0A%0A"
+"Name: "+name+"%0A"
+"Phone: "+phone+"%0A"
+"Location: "+location+"%0A"
+"Liters: "+liters+"L%0A"
+"Total: ₹"+price+"%0A"
+"Payment: "+payment.toUpperCase();

let whatsapp="https://wa.me/918328688331?text="+message;

if(payment==="cod"){
window.open(whatsapp,'_blank');
}
else{

let upi="upi://pay?pa=8328688331@ybl&pn=Milk Service&am="+price+"&cu=INR";

window.location.href=upi;

setTimeout(function(){
alert("After completing payment, click OK to send order.");
window.open(whatsapp,'_blank');
},6000);

}

}

</script>

</body>
</html>
