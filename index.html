<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satish  Milks</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }
 
    body{
      background:url("new.jpg") center/cover no-repeat fixed;
      color:white;
      text-align:center;
    }

    .overlay{
      min-height:100vh;
      padding:40px 20px;
      background:linear-gradient(rgba(0,0,0,0.72),rgba(0,0,0,0.72));
    }

    h1{
      font-size:42px;
      font-weight:700;
      margin-top:20px;
    }

    .subtitle{
      opacity:0.9;
      margin-top:10px;
      font-size:16px;
    }

    .btn{
      background:linear-gradient(45deg,#00c853,#64dd17);
      border:none;
      padding:14px 28px;
      font-size:17px;
      border-radius:30px;
      color:white;
      cursor:pointer;
      margin-top:20px;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.35);
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .container{
      display:none;
      backdrop-filter:blur(14px);
      background:rgba(255,255,255,0.14);
      border-radius:22px;
      padding:25px;
      max-width:430px;
      margin:35px auto 0;
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
    }

    input,select{
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:12px;
      border:none;
      outline:none;
      font-size:15px;
    }

    input:focus,select:focus{
      box-shadow:0 0 8px #64dd17;
    }

    .price{
      margin-top:8px;
      font-size:21px;
      font-weight:600;
    }

    .review{
      margin-top:28px;
      opacity:0.95;
      font-style:italic;
      line-height:1.8;
    }

    .success{
      display:none;
      margin-top:16px;
      color:#98ff98;
      font-weight:600;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>🥛 Krishna Milks</h1>
    <p class="subtitle">Trusted Milk Delivery Since 20+ Years</p>

    <button class="btn" onclick="showOrder()">Order Milk</button>

    <div class="review">
      ⭐ “Pure & Fresh Milk Everyday”<br>
      ⭐ “Fast Delivery & Trusted Service”
    </div>

    <div class="container" id="orderBox">
      <h2>Place Your Order</h2>

      <input type="text" id="name" placeholder="👤 Customer Name">
      <input type="tel" id="phone" placeholder="📞 Phone Number">
      <input type="text" id="location" placeholder="📍 Delivery Location">

      <input
        type="number"
        id="liters"
        placeholder="🥛 Enter liters (Example 1.5)"
        step="0.1"
        oninput="calculatePrice()"
      >

      <div class="price">
        Total Price: ₹ <span id="price">0</span>
      </div>

      <select id="payment">
        <option value="cod">💵 Cash on Delivery</option>
        <option value="upi">📲 UPI Payment</option>
      </select>

      <button class="btn" onclick="processOrder()">Confirm Order</button>

      <div class="success" id="successMsg">
        ✅ మీ ఆర్డర్ విజయవంతంగా పంపబడింది!
      </div>
    </div>
  </div>

  <script>
    function showOrder(){
      document.getElementById("orderBox").style.display = "block";
    }

    function calculatePrice(){
      const liters = parseFloat(document.getElementById("liters").value) || 0;
      const price = liters * 50;
      document.getElementById("price").innerText = price.toFixed(2);
    }

    function processOrder(){
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const location = document.getElementById("location").value.trim();
      const liters = parseFloat(document.getElementById("liters").value) || 0;
      const payment = document.getElementById("payment").value;

      if(!name || !phone || !location || liters <= 0){
        alert("Please fill all details correctly.");
        return;
      }

      const price = liters * 50;
      const paymentTelugu = payment === "cod" ? "డెలివరీ సమయంలో నగదు" : "UPI చెల్లింపు";

      const message =
        "పాలు ఆర్డర్ 🥛%0A%0A" +
        "పేరు: " + encodeURIComponent(name) + "%0A" +
        "ఫోన్ నంబర్: " + encodeURIComponent(phone) + "%0A" +
        "చిరునామా: " + encodeURIComponent(location) + "%0A" +
        "పాలు పరిమాణం: " + encodeURIComponent(liters + " లీటర్లు") + "%0A" +
        "మొత్తం ధర: ₹" + encodeURIComponent(price.toFixed(2)) + "%0A" +
        "చెల్లింపు విధానం: " + encodeURIComponent(paymentTelugu);

      const whatsapp = "https://wa.me/917207258984?text=" + message;

      if(payment === "cod"){
        document.getElementById("successMsg").style.display = "block";
        window.open(whatsapp, "_blank");
      } else {
        const upi = "upi://pay?pa=8328688331@ybl&pn=Krishna%20Milks&am=" + price.toFixed(2) + "&cu=INR";

        document.getElementById("successMsg").style.display = "block";
        window.location.href = upi;

        setTimeout(function(){
          window.open(whatsapp, "_blank");
        }, 5000);
      }
    }
  </script>

</body>
</html>
