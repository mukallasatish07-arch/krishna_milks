<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perimual Dairy</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:url("new.jpg") no-repeat center/cover;
display:flex;
justify-content:center;
align-items:center;
}

/* Dark overlay */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* Glass Card */
.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:350px;
color:white;
text-align:center;
animation:fadeIn 1.2s ease;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

h1{
margin-bottom:10px;
font-weight:700;
}

p{
font-size:14px;
margin-bottom:20px;
color:#ddd;
}

/* Inputs */
input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
outline:none;
}

/* Button */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* Price */
.price{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="container">

<h1>🥛 Perimual Dairy</h1>
<p>Fresh Milk Delivered Daily</p>

<input type="text" id="name" placeholder="Customer Name">
<input type="tel" id="phone" placeholder="Phone Number">
<input type="text" id="location" placeholder="Location">

<input type="number" step="0.1" id="liters"
placeholder="Enter Liters (ex: 1.5)"
oninput="calculatePrice()">

<div class="price" id="total">Total: ₹0</div>

<select id="payment">
<option value="upi">UPI Payment</option>
<option value="cod">Cash On Delivery</option>
</select>

<button onclick="placeOrder()">Order Milk</button>

</div>

<script>

const pricePerLiter = 50;

function calculatePrice(){
let liters = document.getElementById("liters").value;
let total = liters * pricePerLiter || 0;
document.getElementById("total").innerText =
"Total: ₹" + total;
}

function placeOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;
let liters=document.getElementById("liters").value;
let payment=document.getElementById("payment").value;

let total = liters * pricePerLiter;

if(!name || !phone || !location || !liters){
alert("Please fill all details");
return;
}

let message =
`Milk Order 🥛
Name: ${name}
Phone: ${phone}
Location: ${location}
Liters: ${liters}
Total: ₹${total}
Payment: ${payment}`;

let whatsapp =
"https://wa.me/918328688331?text=" +
encodeURIComponent(message);

/* Payment Logic */
if(payment==="upi"){

let upi =
`upi://pay?pa=8328688331@ybl&pn=Perimual Dairy&am=${total}&cu=INR`;

window.location.href = upi;

setTimeout(()=>{
window.open(whatsapp,"_blank");
},5000);

}
else{
window.open(whatsapp,"_blank");
}

}

</script>

</body>
</html>
